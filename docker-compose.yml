
services:

  db:
    image: postgres:16
    container_name: revenueops-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: revenueops
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d revenueops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: revenueops-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revenueops-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:admin123@db:5432/revenueops
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - .:/usr/src/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
   build: ./frontend
   container_name: revenueops-frontend
   ports:
     - "5173:5173"
   volumes:
     - ./frontend:/app
     - /app/node_modules
   command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
   environment:
     - CHOKIDAR_USEPOLLING=true
   depends_on:
     - backend
volumes:
  db_data:
